name: datitos_nam_pf

x-airflow-env: &airflow_env
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@pf-postgres:5432/${AIRFLOW_DB_NAME}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW_UID: ${AIRFLOW_UID}
  TZ: ${TZ}
  SELENIUM_GRID_URL: http://pf-selenium:4444/wd/hub
  AIRFLOW_CONN_MINIO_PF: s3://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@/?endpoint_url=http%3A%2F%2Fpf-minio%3A9000

services:
  pf-postgres:
    image: postgres:15
    container_name: pf_postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    ports:
      - "${PF_POSTGRES_PORT}:5432"
    volumes:
      - pf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pf-minio:
    image: minio/minio:latest
    container_name: pf_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${PF_MINIO_API_PORT}:9000"
      - "${PF_MINIO_CONSOLE_PORT}:9001"
    volumes:
      - pf_minio_data:/data

  pf-minio-init:
    image: minio/mc:latest
    container_name: pf_minio_init
    depends_on:
      - pf-minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set pf http://pf-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done &&
      mc mb -p pf/${PF_BUCKET_RAW} || true &&
      mc mb -p pf/${PF_BUCKET_CURATED} || true &&
      mc mb -p pf/${PF_BUCKET_QA} || true &&
      mc mb -p pf/${PF_BUCKET_DIFF} || true &&
      mc mb -p pf/${PF_BUCKET_PUBLIC} || true &&
      mc version enable pf/${PF_BUCKET_RAW} &&
      mc version enable pf/${PF_BUCKET_CURATED} &&
      exit 0"

  pf-selenium:
    image: selenium/standalone-chrome:latest
    container_name: pf_selenium
    shm_size: 2gb
    ports:
      - "${PF_SELENIUM_PORT}:4444"
      - "${PF_SELENIUM_VNC_PORT}:7900"

  pf-airflow-init:
    build:
      context: .
      dockerfile: infra/airflow.Dockerfile
    container_name: pf_airflow_init
    depends_on:
      pf-postgres:
        condition: service_healthy
      pf-minio-init:
        condition: service_completed_successfully
    environment: *airflow_env
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL} || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  pf-airflow-webserver:
    build:
      context: .
      dockerfile: infra/airflow.Dockerfile
    container_name: pf_airflow_webserver
    depends_on:
      - pf-airflow-init
    environment: *airflow_env
    command: webserver
    ports:
      - "${PF_AIRFLOW_PORT}:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  pf-airflow-scheduler:
    build:
      context: .
      dockerfile: infra/airflow.Dockerfile
    container_name: pf_airflow_scheduler
    depends_on:
      - pf-airflow-init
    environment: *airflow_env
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  pf-airflow-triggerer:
    build:
      context: .
      dockerfile: infra/airflow.Dockerfile
    container_name: pf_airflow_triggerer
    depends_on:
      - pf-airflow-init
    environment: *airflow_env
    command: triggerer
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

volumes:
  pf_postgres_data:
  pf_minio_data:
